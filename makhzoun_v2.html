<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚡ برق – المخزون والمشتريات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg: #f0f7f2;
    --surface: #ffffff;
    --surface2: #e8f5ed;
    --border: #b8dfc7;
    --accent: #1a7a40;
    --accent2: #e74c3c;
    --green: #1a7a40;
    --red: #d63031;
    --blue: #0984e3;
    --text: #1a2e22;
    --muted: #5a7a66;
    --A: #1a7a40;
    --B: #0984e3;
    --C: #7a8c80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 24px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .logo span { color: var(--text); font-size: 14px; font-weight: 400; margin-right: 8px; }

  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-stats strong { color: var(--text); }

  /* NAV */
  .nav {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .nav-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .nav-btn.active, .nav-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* MAIN */
  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 24px;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--surface2); }
  .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 18px; margin-bottom: 8px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone input { display: none; }

  /* SUMMARY CARDS */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .card .card-val { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
  .card .card-lbl { font-size: 12px; color: var(--muted); }
  .card.A { border-top: 3px solid var(--A); }
  .card.B { border-top: 3px solid var(--B); }
  .card.C { border-top: 3px solid var(--C); }
  .card.warn { border-top: 3px solid var(--red); }
  .card.ok { border-top: 3px solid var(--green); }

  /* FILTERS BAR */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filters input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
  }

  .filters input:focus { outline: none; border-color: var(--accent); }

  .filter-btn {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--surface2); position: sticky; top: 56px; }

  th {
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }

  td {
    padding: 11px 14px;
    font-size: 13px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:hover td { background: var(--surface2); }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-A { background: rgba(245,166,35,0.15); color: var(--A); border: 1px solid rgba(245,166,35,0.3); }
  .badge-B { background: rgba(52,152,219,0.15); color: var(--B); border: 1px solid rgba(52,152,219,0.3); }
  .badge-C { background: rgba(136,144,168,0.15); color: var(--C); border: 1px solid rgba(136,144,168,0.3); }

  .order-yes { color: var(--red); font-weight: 700; font-size: 13px; }
  .order-no  { color: var(--green); font-weight: 700; font-size: 13px; }

  .qty-neg { color: var(--red); font-weight: 700; }
  .qty-low { color: var(--A); }
  .qty-ok  { color: var(--green); }

  /* EDIT MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 480px;
  }

  .modal h3 { font-size: 18px; margin-bottom: 20px; color: var(--accent); }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

  .form-group select,
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
  }

  .form-group select:focus,
  .form-group input:focus,
  .form-group textarea:focus { outline: none; border-color: var(--accent); }

  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.7;
  }

  .note-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    color: var(--accent);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .note-icon:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .note-chip {
    display: inline-block;
    max-width: 160px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    font-size: 12px;
    color: var(--muted);
    vertical-align: middle;
    cursor: pointer;
  }
  .note-chip:hover { color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }

  .btn {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty .icon { font-size: 64px; margin-bottom: 16px; }
  .empty h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }

  /* PAGINATION */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .page-btn {
    padding: 7px 13px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  .page-btn:hover:not(.active) { border-color: var(--accent); }

  .page-info { color: var(--muted); font-size: 13px; }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-date { font-size: 13px; color: var(--muted); }
  .history-count { font-size: 14px; font-weight: 700; color: var(--accent); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* SECTION TITLE */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before { content: ''; display: block; width: 4px; height: 20px; background: var(--accent); border-radius: 2px; }

  .date-badge {
    font-size: 12px;
    padding: 3px 10px;
    background: var(--surface2);
    border-radius: 20px;
    color: var(--muted);
  }

  .export-btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .export-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }


  /* SUPPLIERS */
  .sup-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:24px; }
  .sup-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; position:relative;
  }
  .sup-card-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .sup-card-phone { font-size:13px; color:var(--accent); font-weight:600; letter-spacing:.5px; }
  .sup-card-note { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.6; }
  .sup-card-items { margin-top:10px; display:flex; flex-wrap:wrap; gap:5px; }
  .sup-item-tag {
    font-size:11px; padding:2px 8px; border-radius:20px;
    background:var(--surface2); border:1px solid var(--border); color:var(--muted);
    cursor:pointer; transition:all .15s;
  }
  .sup-item-tag:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .sup-card-actions { position:absolute; top:12px; left:14px; display:flex; gap:6px; }
  .sup-card-actions button {
    background:none; border:1px solid var(--border); border-radius:6px;
    padding:3px 8px; font-size:12px; cursor:pointer; color:var(--muted);
    font-family:'Cairo',sans-serif; transition:all .15s;
  }
  .sup-card-actions button:hover { border-color:var(--accent); color:var(--accent); }
  .sup-add-btn {
    display:flex; align-items:center; gap:8px;
    padding:10px 20px; background:var(--accent); color:#fff;
    border:none; border-radius:10px; font-family:'Cairo',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer; margin-bottom:20px;
    transition:all .2s;
  }
  .sup-add-btn:hover { filter:brightness(1.1); }
  .sup-search { margin-bottom:16px; }

  /* SUPPLIER MODAL */
  #supModal .modal { max-width:520px; }
  .sup-linked-list { max-height:200px; overflow-y:auto; margin-top:8px; }
  .sup-linked-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 0; border-bottom:1px solid var(--border); font-size:13px;
  }
  .sup-linked-item:last-child { border-bottom:none; }
  .sup-linked-item button {
    background:none; border:none; color:var(--red); cursor:pointer; font-size:16px;
    padding:0 4px;
  }
  .sup-link-search { margin-bottom:8px; }
  .sup-link-results { max-height:160px; overflow-y:auto; }
  .sup-link-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; cursor:pointer;
  }
  .sup-link-row:hover { color:var(--accent); }
  .sup-link-row:last-child { border-bottom:none; }

  /* ITEM SUPPLIER POPUP (inside edit modal) */
  .item-sup-list { margin-top:8px; display:flex; flex-direction:column; gap:6px; }
  .item-sup-row {
    display:flex; align-items:center; gap:10px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px;
  }
  .item-sup-row .sup-name { font-size:13px; font-weight:700; flex:1; }
  .item-sup-row .sup-phone { font-size:12px; color:var(--accent); }
  .item-sup-row a { font-size:12px; color:var(--accent); text-decoration:none; }

  /* AI TAB */
  .ai-analyze-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
  }
  .ai-analyze-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .ai-analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .ai-report {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    font-size: 14px;
    display: none;
  }
  .ai-report.visible { display: block; }

  .ai-block {
    background: var(--surface2);
    border-right: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin: 14px 0;
  }
  .ai-block h4 { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .ai-block p { font-size: 13px; color: var(--text); line-height: 1.9; margin: 0; }
  .ai-block ul { padding-right: 20px; margin: 0; }
  .ai-block li { font-size: 13px; color: var(--text); line-height: 1.9; }

  .ai-loading {
    display: flex; align-items: center; gap: 12px;
    color: var(--muted); font-size: 14px; padding: 20px 0;
  }
  .ai-spinner {
    width: 22px; height: 22px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-meta {
    font-size: 12px; color: var(--muted);
    margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .ai-meta span { background: var(--surface2); padding: 4px 12px; border-radius: 20px; }

  .ai-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .ai-empty .icon { font-size: 52px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .header-stats { display: none; }
    td, th { padding: 8px 10px; font-size: 12px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
  }


/* ── Extra styles for PO module ── */
:root {
  --po-accent: #1a7a40;
  --po-gold: #d4ac0d;
  --po-red: #c0392b;
  --po-blue: #0984e3;
}

/* Print styles */
@media print {
  .no-print { display: none !important; }
  body { background: white; }
  .po-print-area { display: block !important; }
  nav, .topbar, .tab-content:not(.print-active) { display: none !important; }
}

/* PO Tab styles */
.po-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.po-form h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }

.po-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.po-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.po-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.po-field input, .po-field select, .po-field textarea {
  width: 100%; padding: 9px 12px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  font-family: 'Cairo', sans-serif; font-size: 13px;
}
.po-field input:focus, .po-field select:focus { outline: none; border-color: var(--accent); }

/* PO Items table */
.po-items-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
.po-items-table th {
  background: var(--accent); color: white;
  padding: 9px 10px; text-align: right; font-size: 12px;
}
.po-items-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.po-items-table tr:hover td { background: var(--surface2); }
.po-items-table input {
  width: 100%; padding: 5px 8px; border: 1px solid var(--border);
  border-radius: 6px; background: white; font-family: 'Cairo', sans-serif; font-size: 13px;
}

/* PO List */
.po-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.po-card:hover { border-color: var(--accent); }
.po-card-info { flex: 1; }
.po-card-num { font-size: 15px; font-weight: 700; color: var(--accent); }
.po-card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.po-card-total { font-size: 16px; font-weight: 900; color: var(--text); white-space: nowrap; }
.po-status {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.st-draft    { background: #f0f0f0; color: #666; }
.st-sent     { background: #fef9e7; color: #d4ac0d; }
.st-received { background: #eafaf1; color: #1a7a40; }
.st-approved { background: #e8f5e9; color: #1a7a40; border: 1px solid #1a7a40; }

.po-actions { display: flex; gap: 8px; }

/* Sync status */
.sync-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.sync-ok   { background: #eafaf1; color: #1a7a40; }
.sync-wait { background: #fef9e7; color: #d4ac0d; }
.sync-err  { background: #fdedec; color: #c0392b; }

/* Print area */
.po-print-area {
  display: none;
  font-family: 'Cairo', sans-serif;
  direction: rtl; padding: 20px;
}
.po-print-header {
  display: flex; justify-content: space-between;
  border-bottom: 3px solid #1a7a40; padding-bottom: 12px; margin-bottom: 16px;
}
.po-print-logo { font-size: 28px; font-weight: 900; color: #1a7a40; }
.po-print-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 16px; }
.po-print-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; font-size: 13px; }

<script>
// ══════════════════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════════════════
const SB_URL = 'https://ojvbydnvywbsgyhqftap.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qdmJ5ZG52eXdic2d5aHFmdGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODQyMDcsImV4cCI6MjA5Njk2MDIwN30.3UyyKGcmehGVxadPotOgwYF6CmDbkdb8gw7BFxlYFcU';
const SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// ── Supabase fetch helper ──
async function sbFetch(path, opts = {}) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
      ...opts, headers: { ...SB_HEADERS, ...(opts.headers || {}) }
    });
    if (!r.ok) { const t = await r.text(); throw new Error(t || r.statusText); }
    const t = await r.text(); return t ? JSON.parse(t) : null;
  } catch(e) {
    setSyncStatus('err', '⛔ ' + (e.message || 'خطأ'));
    throw e;
  }
}

// ── Sync Status UI ──
function setSyncStatus(state, msg) {
  const dot = document.getElementById('sb-sync-dot');
  const txt = document.getElementById('sb-sync-text');
  const badge = document.getElementById('po-sb-status');
  const hdr = document.getElementById('sb-status');
  if (state === 'ok')  { dot.textContent='🟢'; txt.textContent=msg||'متصل'; if(badge){badge.className='sync-badge sync-ok';badge.textContent='🟢 متصل';} if(hdr){hdr.className='sync-badge sync-ok';hdr.textContent='🟢 متصل';} }
  if (state === 'wait'){ dot.textContent='🟡'; txt.textContent=msg||'جاري...'; if(badge){badge.className='sync-badge sync-wait';badge.textContent='⏳ '+msg;} }
  if (state === 'err') { dot.textContent='🔴'; txt.textContent=msg||'خطأ'; if(badge){badge.className='sync-badge sync-err';badge.textContent='⛔ خطأ Supabase';} if(hdr){hdr.className='sync-badge sync-err';hdr.textContent='⛔ خطأ';} }
}

// ══════════════════════════════════════════════════
// PURCHASE ORDERS MODULE
// ══════════════════════════════════════════════════
let purchaseOrders = [];
let currentPO = null;   // PO being edited
let poItems = [];        // items in current PO editor
let editingPoId = null;

const PO_TABLE = 'purchase_orders';
const PO_ITEMS_TABLE = 'purchase_order_items';

// ── Generate PO number ──
function genPoNumber() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const existing = purchaseOrders.filter(p => p.po_number && p.po_number.startsWith(`PO-${y}-`));
  const next = String(existing.length + 1).padStart(4,'0');
  return `PO-${y}-${m}-${next}`;
}

// ── Load POs from Supabase ──
async function loadPOs() {
  setSyncStatus('wait', 'جاري التحميل...');
  try {
    const data = await sbFetch(`${PO_TABLE}?select=*,purchase_order_items(*)&order=created_at.desc`);
    purchaseOrders = data || [];
    setSyncStatus('ok', 'متصل');
    renderPoList();
  } catch(e) {
    // fallback to IndexedDB
    const local = await dbGet('purchase_orders');
    purchaseOrders = local || [];
    renderPoList();
  }
}

// ── Save PO to Supabase + IndexedDB ──
async function savePO(statusVal) {
  const supplier_id = document.getElementById('po-supplier').value;
  const expected_date = document.getElementById('po-expected-date').value;
  const branch = document.getElementById('po-branch').value;
  const notes = document.getElementById('po-notes').value;

  if (!supplier_id) { showToast('⚠️ اختار المورد أولاً'); return; }
  if (poItems.length === 0) { showToast('⚠️ أضف أصناف للأمر'); return; }

  const supObj = suppliers.find(s => s.id === supplier_id);
  const total = poItems.reduce((s, i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.unit_price)||0), 0);

  const po = {
    po_number: editingPoId ? currentPO?.po_number : genPoNumber(),
    supplier_id,
    supplier_name: supObj?.name || '',
    branch,
    expected_date: expected_date || null,
    notes,
    status: statusVal,
    total_amount: Math.round(total * 100) / 100,
    created_at: editingPoId ? currentPO?.created_at : new Date().toISOString(),
    updated_at: new Date().toISOString(),
    synced_to_pricing: false,
  };

  setSyncStatus('wait', 'جاري الحفظ...');
  try {
    let savedPO;
    if (editingPoId) {
      const updated = await sbFetch(`${PO_TABLE}?id=eq.${editingPoId}`, {
        method: 'PATCH', body: JSON.stringify(po)
      });
      savedPO = updated?.[0] || { ...po, id: editingPoId };
    } else {
      const created = await sbFetch(PO_TABLE, { method: 'POST', body: JSON.stringify(po) });
      savedPO = created?.[0] || { ...po, id: Date.now().toString() };
    }

    // Save items
    if (savedPO?.id) {
      // Delete old items if editing
      if (editingPoId) {
        await sbFetch(`${PO_ITEMS_TABLE}?po_id=eq.${editingPoId}`, { method: 'DELETE' });
      }
      // Insert new items
      const itemsPayload = poItems.map(item => ({
        po_id: savedPO.id,
        sku: item.sku || '',
        product_name: item.name,
        unit: item.unit || '',
        qty_ordered: parseFloat(item.qty) || 0,
        unit_price: parseFloat(item.unit_price) || 0,
        total_price: (parseFloat(item.qty)||0) * (parseFloat(item.unit_price)||0),
        current_stock: parseFloat(item.current_stock) || 0,
      }));
      await sbFetch(PO_ITEMS_TABLE, { method: 'POST', body: JSON.stringify(itemsPayload) });
    }

    setSyncStatus('ok', 'محفوظ ✓');
    showToast(statusVal === 'sent' ? '📤 تم الإرسال للتسعير ✓' : '💾 تم حفظ المسودة ✓');

    // Also save locally as backup
    await loadPOs();
    await dbSet('purchase_orders', purchaseOrders);

    if (statusVal === 'sent') {
      // Sync to tas3eer (pricing system) via Supabase
      await syncPOtoPricing(savedPO, poItems);
    }

    resetPoForm();
    showPoView('list');
  } catch(e) {
    // Save locally if Supabase fails
    const localPO = { ...po, id: Date.now().toString(), items: poItems };
    purchaseOrders.unshift(localPO);
    await dbSet('purchase_orders', purchaseOrders);
    setSyncStatus('err', 'خطأ – محفوظ محلياً');
    showToast('⚠️ خطأ في الاتصال – تم الحفظ محلياً');
    showPoView('list');
    renderPoList();
  }
}

// ── Sync PO to Pricing System (tas3eer) ──
async function syncPOtoPricing(po, items) {
  try {
    // Insert into pricing_sync table that tas3eer reads
    const syncPayload = {
      po_number: po.po_number,
      po_id: po.id,
      supplier_name: po.supplier_name,
      branch: po.branch,
      status: 'pending_data_entry',  // مدخل البيانات يستقبله
      total_amount: po.total_amount,
      items: JSON.stringify(items),
      created_at: new Date().toISOString(),
      synced: false,
    };
    await sbFetch('po_sync', { method: 'POST', body: JSON.stringify(syncPayload) });
    showToast('✅ تم الإرسال لنظام التسعير');
  } catch(e) {
    console.warn('Sync to pricing failed:', e);
    // Non-critical - PO is saved, sync will retry
  }
}

// ── Render PO List ──
function renderPoList() {
  const q = (document.getElementById('po-search')?.value || '').toLowerCase();
  const sf = document.getElementById('po-filter-status')?.value || '';
  let list = [...purchaseOrders];
  if (q) list = list.filter(p => (p.po_number||'').toLowerCase().includes(q) || (p.supplier_name||'').includes(q));
  if (sf) list = list.filter(p => p.status === sf);

  const container = document.getElementById('po-list-container');
  if (!list.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);">
      <div style="font-size:48px;margin-bottom:12px;">📋</div>
      <div>لا توجد أوامر شراء بعد</div>
      <button class="btn-primary" style="margin-top:14px;" onclick="showPoView('new')">➕ إنشاء أول أمر</button>
    </div>`;
    return;
  }

  const stLabels = { draft:'مسودة', sent:'مرسل للتسعير', received:'مستلم', approved:'معتمد' };
  const stClasses = { draft:'st-draft', sent:'st-sent', received:'st-received', approved:'st-approved' };

  container.innerHTML = list.map(po => `
    <div class="po-card">
      <div class="po-card-info">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span class="po-card-num">${po.po_number || 'بدون رقم'}</span>
          <span class="po-status ${stClasses[po.status]||'st-draft'}">${stLabels[po.status]||po.status}</span>
          ${po.synced_to_pricing ? '<span class="sync-badge sync-ok" style="font-size:10px;">🔗 مرسل للتسعير</span>' : ''}
        </div>
        <div class="po-card-meta">
          🏪 ${po.supplier_name || '—'} &nbsp;|&nbsp;
          📅 ${po.expected_date ? new Date(po.expected_date).toLocaleDateString('ar-EG') : '—'} &nbsp;|&nbsp;
          🏬 ${po.branch || '—'} &nbsp;|&nbsp;
          📦 ${(po.purchase_order_items||po.items||[]).length} صنف
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div class="po-card-total">${(po.total_amount||0).toLocaleString('ar-EG',{minimumFractionDigits:0})} ج</div>
        <div class="po-actions">
          <button class="btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="viewPODetail('${po.id}')">👁️ عرض</button>
          <button class="btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="editPO('${po.id}')">✏️ تعديل</button>
          <button class="btn-print"     style="padding:5px 10px;font-size:12px;" onclick="printPO('${po.id}')">🖨️ طباعة</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── View PO Detail ──
function viewPODetail(id) {
  const po = purchaseOrders.find(p => p.id == id);
  if (!po) return;
  const items = po.purchase_order_items || po.items || [];
  const stLabels = { draft:'مسودة', sent:'مرسل للتسعير', received:'مستلم', approved:'معتمد' };

  document.getElementById('po-view-list').style.display = 'none';
  document.getElementById('po-view-new').style.display = 'none';
  document.getElementById('po-view-detail').style.display = 'block';
  document.getElementById('po-view-detail').innerHTML = `
    <div style="margin-bottom:12px;display:flex;gap:8px;">
      <button class="btn-secondary" onclick="showPoView('list')">← رجوع</button>
      <button class="btn-print" onclick="printPO('${po.id}')">🖨️ طباعة</button>

<!-- ══════════ ORIGINAL MAKHZOUN JS ══════════ -->
<script>



// =================== STATE ===================
let rawData = [];
let processedData = [];
let orderFilter = 'all';
let allFilter = 'all';
let sortField = 'totalCost';
let sortDir = -1;
let sortFieldAll = 'totalCost';
let sortDirAll = -1;
let ordersPage = 1;
let allPage = 1;
const PAGE_SIZE = 50;

let threshA = 70, threshB = 90, minA = 10, minB = 5, minC = 2;
let overrides = {}, suppliers = [], supEditId = null, supLinkedSkus = [];
let history = [];

// =================== INDEXEDDB ENGINE ===================
let db;
const DB_NAME = 'barq_makhzoun', DB_VER = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv', { keyPath: 'k' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(k) {
  return new Promise(res => {
    const r = db.transaction('kv','readonly').objectStore('kv').get(k);
    r.onsuccess = () => res(r.result ? r.result.v : null);
    r.onerror = () => res(null);
  });
}

function dbSet(k, v) {
  return new Promise(res => {
    if (!db) { console.warn('DB not ready yet'); res(); return; }
    try {
      const tx = db.transaction('kv','readwrite');
      tx.objectStore('kv').put({ k, v });
      tx.oncomplete = () => { flashSaved(); res(); };
      tx.onerror = () => res();
    } catch(e) { console.error('dbSet error:', e); res(); }
  });
}

function flashSaved() {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.style.display = 'inline';
  clearTimeout(window._st);
  window._st = setTimeout(() => { el.style.display = 'none'; }, 2000);
}

async function loadAllData() {
  const s = await dbGet('settings');
  if (s) { threshA=s.threshA??70; threshB=s.threshB??90; minA=s.minA??10; minB=s.minB??5; minC=s.minC??2; }
  const ov = await dbGet('overrides'); if (ov) Object.assign(overrides, ov);
  const sup = await dbGet('suppliers'); if (sup) suppliers = sup;
  const hist = await dbGet('history'); if (hist) { history.length=0; history.push(...hist); }
}

// =================== BACKUP ===================
function exportBackup() {
  const data = { version:1, exportedAt: new Date().toLocaleString('ar-EG'),
    suppliers, overrides, settings:{threshA,threshB,minA,minB,minC}, history };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = 'barq_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}

function importBackup(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.suppliers) { suppliers=d.suppliers; await dbSet('suppliers',suppliers); }
      if (d.overrides) { Object.assign(overrides,d.overrides); await dbSet('overrides',overrides); }
      if (d.settings) {
        threshA=d.settings.threshA??70; threshB=d.settings.threshB??90;
        minA=d.settings.minA??10; minB=d.settings.minB??5; minC=d.settings.minC??2;
        await dbSet('settings',{threshA,threshB,minA,minB,minC});
        document.getElementById('threshA').value=threshA;
        document.getElementById('threshB').value=threshB;
        document.getElementById('minA').value=minA;
        document.getElementById('minB').value=minB;
        document.getElementById('minC').value=minC;
      }
      if (d.history) { history.length=0; history.push(...d.history); await dbSet('history',history); renderHistory(); }
      renderSuppliers();
      if (processedData.length) processData();
      alert('✅ تم الاستيراد بنجاح');
    } catch(err) { alert('❌ خطأ: '+err.message); }
  };
  reader.readAsText(file);
  document.getElementById('importFile').value='';
}

// =================== INIT ===================
openDB().then(loadAllData).then(() => {
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ar-EG');
  document.getElementById('threshA').value = threshA;
  document.getElementById('threshB').value = threshB;
  document.getElementById('minA').value = minA;
  document.getElementById('minB').value = minB;
  document.getElementById('minC').value = minC;
  renderHistory();
  renderSuppliers();
});

// =================== FILE HANDLING ===================
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: (results) => {
      rawData = results.data;
      processData();
      saveToHistory(file.name);
      document.getElementById('lastUpload').textContent = new Date().toLocaleTimeString('ar-EG');
      document.getElementById('uploadDateBadge').textContent = new Date().toLocaleDateString('ar-EG');
    }
  });
}

// =================== PROCESS DATA ===================
function processData() {
  const totalCost = rawData.reduce((s, r) => s + (parseFloat(r['Total Cost']) || 0), 0);
  let sorted = [...rawData].sort((a, b) => (parseFloat(b['Total Cost']) || 0) - (parseFloat(a['Total Cost']) || 0));

  let cumulative = 0;
  const classified = sorted.map(row => {
    const cost = parseFloat(row['Total Cost']) || 0;
    cumulative += cost;
    const pct = totalCost > 0 ? (cumulative / totalCost) * 100 : 0;
    let autoClass = pct <= threshA ? 'A' : pct <= threshB ? 'B' : 'C';
    const sku = row['SKU'] || '';
    const ov = overrides[sku] || {};
    const finalClass = ov.class || autoClass;
    const defaultMin = finalClass === 'A' ? minA : finalClass === 'B' ? minB : minC;
    const minQty = ov.minQty !== undefined ? ov.minQty : defaultMin;
    const qty = parseFloat(row['Quantity']) || 0;
    const needOrder = qty <= minQty;

    return {
      name: row['Name'] || '',
      sku: sku,
      unit: row['Storage Unit'] || '',
      qty: qty,
      costPerUnit: parseFloat(row['Cost Per Unit']) || 0,
      totalCost: cost,
      autoClass,
      class: finalClass,
      minQty,
      needOrder,
      pct,
      notes: ov.notes || ''
    };
  });

  processedData = classified;
  updateSummary();
  renderOrders();
  renderAll();
  renderManualList();
  drawChart();

  document.getElementById('summaryCards').style.display = 'block';
  document.getElementById('emptyDash').style.display = 'none';
} // end processData

// =================== SUMMARY ===================
function updateSummary() {
  document.getElementById('totalItems').textContent = processedData.length;
  document.getElementById('countA').textContent = processedData.filter(r => r.class === 'A').length;
  document.getElementById('countB').textContent = processedData.filter(r => r.class === 'B').length;
  document.getElementById('countC').textContent = processedData.filter(r => r.class === 'C').length;
  document.getElementById('orderNow').textContent = processedData.filter(r => r.needOrder).length;
  document.getElementById('negStock').textContent = processedData.filter(r => r.qty < 0).length;

  // Urgent list
  const urgent = processedData.filter(r => r.needOrder && r.class === 'A').slice(0, 10);
  document.getElementById('urgentList').innerHTML = urgent.length
    ? urgent.map(r => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span>${r.name}</span>
        <span class="${r.qty < 0 ? 'qty-neg' : 'qty-low'}">${r.qty.toFixed(2)}</span>
      </div>`).join('')
    : '<p style="color:var(--muted);font-size:13px;margin-top:12px;">✅ لا توجد أصناف A تحتاج طلب فوري</p>';
}

// =================== CHART ===================
function drawChart() {
  const canvas = document.getElementById('abcChart');
  const ctx = canvas.getContext('2d');
  const cA = processedData.filter(r => r.class === 'A').length;
  const cB = processedData.filter(r => r.class === 'B').length;
  const cC = processedData.filter(r => r.class === 'C').length;
  const total = cA + cB + cC;
  if (!total) return;

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2 - 30, cy = H / 2, r = Math.min(cx, cy) - 20;
  const data = [
    { val: cA, color: '#f5a623', label: `A (${cA})` },
    { val: cB, color: '#3498db', label: `B (${cB})` },
    { val: cC, color: '#8890a8', label: `C (${cC})` }
  ];
  let start = -Math.PI / 2;
  data.forEach(d => {
    const angle = (d.val / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + angle);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    start += angle;
  });

  // Legend
  let ly = cy - 30;
  data.forEach(d => {
    ctx.fillStyle = d.color;
    ctx.fillRect(W - 70, ly, 14, 14);
    ctx.fillStyle = '#e8eaf0';
    ctx.font = '13px Cairo';
    ctx.textAlign = 'right';
    ctx.fillText(d.label, W, ly + 12);
    ly += 24;
  });
}

// =================== PAGER ===================
function renderPager(id, pages, current, onClick) {
  const el = document.getElementById(id);
  if (pages <= 1) { el.innerHTML = ''; return; }
  let btns = '';
  if (current > 1) btns += `<button class="page-btn" onclick="(${onClick.toString()})(${current-1})">‹</button>`;
  for (let i = Math.max(1, current-2); i <= Math.min(pages, current+2); i++) {
    btns += `<button class="page-btn ${i===current?'active':''}" onclick="(${onClick.toString()})(${i})">${i}</button>`;
  }
  if (current < pages) btns += `<button class="page-btn" onclick="(${onClick.toString()})(${current+1})">›</button>`;
  btns += `<span class="page-info">صفحة ${current} من ${pages}</span>`;
  el.innerHTML = btns;
}

function exportCSV(data, name) {
  const headers = ['الاسم', 'SKU', 'الوحدة', 'الكمية', 'الحد الأدنى', 'الشريحة', 'القرار', 'التكلفة الإجمالية'];
  const rows = data.map(r => [
    r.name, r.sku, r.unit, r.qty.toFixed(2), r.minQty, r.class,
    r.needOrder ? 'اطلب' : 'لا تطلب', r.totalCost.toFixed(2)
  ]);
  const csv = '\uFEFF' + [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `${name}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function runAIAnalysis() {
  const btn = document.getElementById('aiBtn');
  const loading = document.getElementById('aiLoading');
  const report = document.getElementById('aiReport');

  btn.disabled = true;
  loading.style.display = 'flex';
  report.classList.remove('visible');
  report.innerHTML = '';
  document.getElementById('aiLoadingText').textContent = 'بيحلل بياناتك...';

  setTimeout(() => {
    try {
      const total = processedData.length;
      const needOrder = processedData.filter(r => r.needOrder);
      const negStock = processedData.filter(r => r.qty < 0);
      const classA = processedData.filter(r => r.class === 'A');
      const classB = processedData.filter(r => r.class === 'B');
      const classC = processedData.filter(r => r.class === 'C');
      const classAOrder = classA.filter(r => r.needOrder);
      const totalValue = processedData.reduce((s, r) => s + r.totalCost, 0);

      // أعلى 10 أصناف من حيث القيمة (أكتر حاجة بتاخد فلوس)
      const top10Cost = [...processedData].sort((a, b) => b.totalCost - a.totalCost).slice(0, 10);

      // أصناف حرجة تحتاج طلب فوري (أولوية لـ A ثم B ثم C)
      const criticalItems = [...needOrder].sort((a, b) => {
        const p = { A: 3, B: 2, C: 1 };
        return (p[b.class] || 0) - (p[a.class] || 0);
      }).slice(0, 15);

      // أصناف راكدة: شريحة C بس كمية عالية جداً (يعني تكلفة معدومة لكن مخزون مكدّس)
      const skuToSupplier = {};
      suppliers.forEach(s => (s.skus || []).forEach(sku => { skuToSupplier[sku] = s.name; }));
      const noSupplierItems = processedData.filter(r => r.class === 'A' && !skuToSupplier[r.sku]).slice(0, 10);

      // أصناف بكمية عالية جداً مقارنة بالحد الأدنى (احتمال تكديس/زيادة طلب)
      const overstock = processedData
        .filter(r => r.minQty > 0 && r.qty > r.minQty * 4)
        .sort((a, b) => (b.qty / (b.minQty || 1)) - (a.qty / (a.minQty || 1)))
        .slice(0, 10);

      // أقل 10 أصناف من حيث القيمة ضمن شريحة A أو B (يعني مش بتتباع كتير رغم أهميتها)
      const lowMovement = [...classA, ...classB]
        .filter(r => r.qty > 0)
        .sort((a, b) => a.totalCost - b.totalCost)
        .slice(0, 8);

      let html = `<div class="ai-meta">
        <span>📅 ${new Date().toLocaleString('ar-EG')}</span>
        <span>📦 ${total} صنف</span>
        <span>🔴 ${needOrder.length} يحتاج طلب</span>
        <span>💰 ${totalValue.toLocaleString('ar-EG', {maximumFractionDigits:0})} ج</span>
      </div>`;

      // 1) تحذيرات عاجلة
      let urgentBody = '';
      if (negStock.length) {
        urgentBody += `<li><strong>${negStock.length} صنف بمخزون سالب</strong> — خطأ في الجرد أو بيع بدون تسجيل: ${negStock.slice(0,5).map(r=>r.name).join('، ')}${negStock.length>5?' ...':''}</li>`;
      }
      if (classAOrder.length) {
        urgentBody += `<li><strong>${classAOrder.length} صنف من شريحة A</strong> (الأهم) تحتاج طلب فوري — دول بياخدوا أكبر نسبة من قيمة مخزونك</li>`;
      }
      if (!urgentBody) urgentBody = '<li>لا توجد تحذيرات عاجلة حالياً ✅</li>';
      html += aiBlock('🚨 تحذيرات عاجلة', '#d63031', urgentBody);

      // 2) أكتر الأصناف طلباً / احتياجاً (الأهم - تتكرر باستمرار)
      let orderBody = criticalItems.length
        ? criticalItems.map(r => `<li><strong>${r.name}</strong> — شريحة ${r.class} | الكمية الحالية: ${r.qty.toFixed(2)} ${r.unit||''} | الحد الأدنى: ${r.minQty}</li>`).join('')
        : '<li>لا توجد أصناف تحتاج طلب حالياً ✅</li>';
      html += aiBlock('📦 الأكتر طلباً الآن (لازم تزوّد)', '#1a7a40', orderBody);

      // 3) أصناف "مش بتتطلب" / حركة بطيئة رغم أهميتها
      let slowBody = lowMovement.length
        ? lowMovement.map(r => `<li><strong>${r.name}</strong> — شريحة ${r.class} | قيمة منخفضة نسبياً: ${r.totalCost.toLocaleString('ar-EG',{maximumFractionDigits:0})} ج رغم إنه من الأصناف المهمة</li>`).join('')
        : '<li>لا توجد ملاحظات هنا</li>';
      html += aiBlock('📉 أصناف مهمة لكن حركتها ضعيفة', '#8890a8', slowBody);

      // 4) أصناف مكدّسة (طلب زيادة عن اللزوم)
      let overBody = overstock.length
        ? overstock.map(r => `<li><strong>${r.name}</strong> — الكمية ${r.qty.toFixed(2)} مقابل حد أدنى ${r.minQty} (زيادة ${(r.qty/(r.minQty||1)).toFixed(1)}x) — قلل الطلب القادم</li>`).join('')
        : '<li>لا يوجد تكديس ملحوظ ✅</li>';
      html += aiBlock('📦➕ أصناف عندك زيادة منها (قلل الطلب)', '#e67e22', overBody);

      // 5) أعلى قيمة في المخزون
      let costBody = top10Cost.map(r => `<li><strong>${r.name}</strong> — ${r.totalCost.toLocaleString('ar-EG',{maximumFractionDigits:0})} ج | شريحة ${r.class} | كمية: ${r.qty.toFixed(2)}</li>`).join('');
      html += aiBlock('💰 أعلى 10 أصناف بتاخد فلوسك', '#0984e3', costBody);

      // 6) أصناف مهمة بدون مورد مرتبط
      let supBody = noSupplierItems.length
        ? noSupplierItems.map(r => `<li><strong>${r.name}</strong> (شريحة A) — مفيش مورد مرتبط بيه، اربطه من تاب الموردين</li>`).join('')
        : '<li>كل أصناف شريحة A مرتبطة بموردين ✅</li>';
      html += aiBlock('🏪 أصناف مهمة بدون مورد محدد', '#9b59b6', supBody);

      // 7) خلاصة عامة
      const summaryBody = `
        <li>عندك <strong>${classA.length}</strong> صنف شريحة A (الأهم) و <strong>${classB.length}</strong> شريحة B و <strong>${classC.length}</strong> شريحة C</li>
        <li>نسبة الأصناف اللي محتاجة طلب: <strong>${total ? ((needOrder.length/total)*100).toFixed(0) : 0}%</strong></li>
        <li>ركّز جهدك على شريحة A — دي اللي بتحرك أكبر قيمة في مخزونك</li>
      `;
      html += aiBlock('✅ خلاصة', '#27ae60', summaryBody);

      loading.style.display = 'none';
      btn.disabled = false;
      btn.innerHTML = '<span>🔄</span> تحديث التحليل';

      report.innerHTML = html;
      report.classList.add('visible');

    } catch (err) {
      loading.style.display = 'none';
      btn.disabled = false;
      report.innerHTML = `<div class="ai-block"><h4>❌ حدث خطأ</h4><p>${err.message}</p></div>`;
      report.classList.add('visible');
    }
  }, 400);
}

function aiBlock(title, color, bodyHtml) {
  return `<div class="ai-block" style="border-right-color:${color}"><h4 style="color:${color}">${title}</h4><ul>${bodyHtml}</ul></div>`;
}

    s.name.toLowerCase().includes(q) ||
    (s.phone || '').includes(q) ||
    (s.company || '').toLowerCase().includes(q) ||
    (s.skus || []).some(sku => {
      const item = processedData.find(r => r.sku === sku);
      return item && item.name.toLowerCase().includes(q);
    })
  );
  const grid = document.getElementById('supGrid');
  const empty = document.getElementById('supEmpty');
  if (!data.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = data.map(s => {
    const linkedItems = (s.skus || []).map(sku => processedData.find(r => r.sku === sku)).filter(Boolean);
    const tags = linkedItems.slice(0, 4).map(item =>
      `<span class="sup-item-tag" onclick="openItemSupModal('${item.sku}','${item.name.replace(/'/g,"\\'")}')">📦 ${item.name}</span>`
    ).join('');
    const moreCount = linkedItems.length > 4 ? `<span class="sup-item-tag" style="background:var(--accent);color:#fff;border-color:var(--accent)">+${linkedItems.length - 4} أصناف</span>` : '';
    return `<div class="sup-card" id="sup-card-${s.id}">
      <div class="sup-card-actions">
        <button onclick="openSupModal('${s.id}')">✏️</button>
        <button onclick="deleteSupplier('${s.id}')">🗑</button>
      </div>
      <div class="sup-card-name" onclick="toggleSupDetail('${s.id}')" style="cursor:pointer">🏪 ${s.name} <span style="font-size:11px;color:var(--muted)" id="sup-arrow-${s.id}">▼</span></div>
      ${s.company ? `<div style="font-size:12px;color:var(--muted);margin-bottom:2px">🏢 ${s.company}</div>` : ''}
      <div class="sup-card-phone">📞 ${s.phone || '—'}</div>
      ${s.note ? `<div class="sup-card-note">${s.note}</div>` : ''}
      ${tags || moreCount ? `<div class="sup-card-items">${tags}${moreCount}</div>` : '<div style="font-size:12px;color:var(--muted);margin-top:8px">لا توجد أصناف مرتبطة بعد</div>'}
      <div id="sup-detail-${s.id}" style="display:none;margin-top:12px">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;border-top:1px solid var(--border);padding-top:10px">📦 الأصناف المرتبطة (${linkedItems.length})</div>
        ${linkedItems.length ? `<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">
          <thead><tr style="background:var(--surface2)">
            <th style="padding:6px 8px;text-align:right;white-space:nowrap">الصنف</th>
            <th style="padding:6px 8px;text-align:right">الكمية</th>
            <th style="padding:6px 8px;text-align:right">شريحة</th>
            <th style="padding:6px 8px;text-align:right">قرار</th>
          </tr></thead>
          <tbody>${linkedItems.map(item => `<tr style="border-top:1px solid var(--border)">
            <td style="padding:6px 8px">${item.name}</td>
            <td style="padding:6px 8px;color:${item.qty < 0 ? 'var(--red)' : item.needOrder ? 'var(--A)' : 'var(--green)'};font-weight:700">${item.qty.toFixed(2)} ${item.unit}</td>
            <td style="padding:6px 8px"><span class="badge badge-${item.class}">${item.class}</span></td>
            <td style="padding:6px 8px">${item.needOrder ? '🔴 اطلب' : '✅ لا تطلب'}</td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<p style="color:var(--muted);font-size:12px;margin-top:4px">ما في أصناف مرتبطة — ارفع بيانات المخزون أو أضف أصناف للمورد</p>'}
      </div>
    </div>`;
  }).join('');
}

function toggleSupDetail(id) {
  const el = document.getElementById('sup-detail-' + id);
  const arrow = document.getElementById('sup-arrow-' + id);
  if (!el) return;
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  if (arrow) arrow.textContent = open ? '▲' : '▼';
}

function openSupModal(id) {
  supEditId = id || null;
  const sup = id ? suppliers.find(s => s.id === id) : null;
  document.getElementById('supModalTitle').textContent = sup ? '✏️ تعديل مورد' : '🏪 إضافة مورد';
  document.getElementById('supId').value = id || '';
  document.getElementById('supName').value = sup?.name || '';
  document.getElementById('supCompany').value = sup?.company || '';
  document.getElementById('supPhone').value = sup?.phone || '';
  document.getElementById('supNote').value = sup?.note || '';
  supLinkedSkus = sup ? [...(sup.skus || [])] : [];
  document.getElementById('supLinkSearch').value = '';
  renderSupLinkedItems();
  renderSupLinkResults();
  document.getElementById('supModal').classList.add('open');
}

function closeSupModal() {
  document.getElementById('supModal').classList.remove('open');
}

function renderSupLinkedItems() {
  const el = document.getElementById('supLinkedItems');
  if (!supLinkedSkus.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px">لا توجد أصناف مرتبطة</p>'; return; }
  el.innerHTML = supLinkedSkus.map(sku => {
    const item = processedData.find(r => r.sku === sku);
    const name = item ? item.name : sku;
    return `<div class="sup-linked-item"><span>${name}</span><button onclick="supRemoveSku('${sku}')" title="إزالة">✕</button></div>`;
  }).join('');
}

function supRemoveSku(sku) {
  supLinkedSkus = supLinkedSkus.filter(s => s !== sku);
  renderSupLinkedItems();
  renderSupLinkResults();
}

function renderSupLinkResults() {
  const q = (document.getElementById('supLinkSearch')?.value || '').toLowerCase();
  const el = document.getElementById('supLinkResults');
  if (!processedData.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px">ارفع بيانات المخزون أولاً لربط الأصناف</p>'; return; }
  let items = processedData.filter(r => !supLinkedSkus.includes(r.sku));
  if (q) items = items.filter(r => r.name.toLowerCase().includes(q) || r.sku.toLowerCase().includes(q));
  items = items.slice(0, 8);
  if (!items.length) { el.innerHTML = q ? '<p style="color:var(--muted);font-size:12px">لا توجد نتائج</p>' : ''; return; }
  el.innerHTML = items.map(r => `<div class="sup-link-row" onclick="supAddSku('${r.sku}')">
    <span>${r.name}</span><span style="color:var(--accent);font-size:12px">＋ إضافة</span>
  </div>`).join('');
}

function supAddSku(sku) {
  if (!supLinkedSkus.includes(sku)) supLinkedSkus.push(sku);
  renderSupLinkedItems();
  renderSupLinkResults();
}

function saveSupplier() {
  const name = document.getElementById('supName').value.trim();
  if (!name) { alert('اكتب اسم المورد'); return; }
  const phone = document.getElementById('supPhone').value.trim();
  const company = document.getElementById('supCompany').value.trim();
  const note = document.getElementById('supNote').value.trim();
  if (supEditId) {
    const idx = suppliers.findIndex(s => s.id === supEditId);
    if (idx !== -1) suppliers[idx] = { ...suppliers[idx], name, phone, company, note, skus: supLinkedSkus };
  } else {
    suppliers.push({ id: Date.now().toString(), name, phone, company, note, skus: supLinkedSkus });
  }
  saveSuppliers();
  closeSupModal();
  renderSuppliers();
}

function deleteSupplier(id) {
  if (!confirm('حذف هذا المورد؟')) return;
  suppliers = suppliers.filter(s => s.id !== id);
  saveSuppliers();
  renderSuppliers();
}

// =================== EXCEL IMPORT FOR SUPPLIERS ===================
function importSuppliersExcel(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      let added = 0, skipped = 0;
      rows.forEach(row => {
        const name = (row['اسم المورد'] || row['name'] || row['Name'] || '').toString().trim();
        if (!name) { skipped++; return; }
        const phone = (row['التليفون'] || row['هاتف'] || row['phone'] || row['Phone'] || '').toString().trim();
        const company = (row['الشركة'] || row['company'] || row['Company'] || '').toString().trim();
        const note = (row['ملاحظات'] || row['note'] || row['Notes'] || '').toString().trim();
        const existing = suppliers.find(s => s.name === name);
        if (existing) { skipped++; return; }
        suppliers.push({ id: Date.now().toString() + Math.random().toString(36).slice(2), name, phone, company, note, skus: [] });
        added++;
      });
      saveSuppliers();
      renderSuppliers();
      alert(`✅ تم الاستيراد بنجاح\n✔️ مضاف: ${added} مورد\n⏭️ متجاهل (مكرر/فارغ): ${skipped}`);
    } catch(err) {
      alert('❌ خطأ في قراءة الملف: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function downloadSupplierTemplate() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['اسم المورد','التليفون','الشركة','ملاحظات'],
    ['أحمد للبهارات','01001234567','شركة النيل للتوزيع','يوريد الاثنين والخميس'],
    ['مورد الألبان المركزي','01112345678','','شروط دفع 30 يوم'],
  ]);
  XLSX.utils.book_append_sheet(wb, ws, 'الموردين');
  XLSX.writeFile(wb, 'نموذج_الموردين.xlsx');
}

// Item → suppliers popup
function openItemSupModal(sku, name) {
  const linked = suppliers.filter(s => (s.skus || []).includes(sku));
  document.getElementById('itemSupName').textContent = name;
  const list = document.getElementById('itemSupList');
  const empty = document.getElementById('itemSupEmpty');
  if (!linked.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = linked.map(s => `
      <div class="item-sup-row">
        <span class="sup-name">🏪 ${s.name}</span>
        <div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">
          ${s.company ? `<span style="font-size:11px;color:var(--muted)">🏢 ${s.company}</span>` : ''}
          <span class="sup-phone">📞 ${s.phone || '—'}</span>
          ${s.phone ? `<a href="tel:${s.phone}" style="font-size:12px;color:var(--accent)">اتصل</a>` : ''}
        </div>
      </div>
    `).join('');
  }
  document.getElementById('itemSupModal').classList.add('open');
}

function closeItemSupModal() {
  document.getElementById('itemSupModal').classList.remove('open');
}

document.getElementById('supModal').addEventListener('click', function(e) { if (e.target === this) closeSupModal(); });
document.getElementById('itemSupModal').addEventListener('click', function(e) { if (e.target === this) closeItemSupModal(); });

</script>
