<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تحضير القسم - برق</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:'Cairo',-apple-system,sans-serif; background:#f4f7f5; color:#1a3a2a; }
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

  .screen { min-height:100vh; display:flex; flex-direction:column; }

  /* ---- Login ---- */
  .login-wrap { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px; }
  .login-card { width:100%; max-width:380px; background:#fff; border-radius:18px; padding:28px 22px; box-shadow:0 4px 20px rgba(0,0,0,.08); }
  .login-title { font-size:20px; font-weight:800; text-align:center; margin-bottom:4px; color:#0a5c33; }
  .login-sub { font-size:13px; text-align:center; color:#789; margin-bottom:22px; }
  .dept-btn { width:100%; display:block; padding:16px; margin-bottom:10px; border:2px solid #e3ede6; border-radius:14px; background:#fafcfb; font-size:17px; font-weight:700; color:#1a3a2a; text-align:center; cursor:pointer; }
  .dept-btn.active { border-color:#0a8d4b; background:#eafcf1; color:#0a5c33; }
  .pass-input { width:100%; padding:16px; font-size:22px; letter-spacing:6px; text-align:center; border:2px solid #e3ede6; border-radius:14px; margin-top:14px; }
  .login-go { width:100%; margin-top:14px; padding:16px; border:none; border-radius:14px; background:#0a8d4b; color:#fff; font-size:18px; font-weight:800; cursor:pointer; }
  .login-go:disabled { background:#c9d6ce; }
  .login-err { color:#c0392b; font-size:14px; text-align:center; margin-top:10px; min-height:18px; }

  /* ---- Main ---- */
  .topbar { background:#0a5c33; color:#fff; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
  .topbar .dept-name { font-size:18px; font-weight:800; }
  .topbar .logout { font-size:13px; opacity:.85; background:none; border:1px solid rgba(255,255,255,.5); color:#fff; padding:6px 12px; border-radius:20px; }
  .status-line { padding:8px 16px; font-size:12px; color:#789; background:#eef4f0; display:flex; justify-content:space-between; }
  .empty { text-align:center; padding:60px 20px; color:#9ab; font-size:16px; }

  .branch-block { margin:14px 12px; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.05); }
  .branch-head { background:#0a8d4b; color:#fff; padding:12px 16px; font-size:16px; font-weight:800; display:flex; justify-content:space-between; }
  .branch-head .cnt { font-size:12px; font-weight:600; opacity:.9; }

  .item-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #f0f5f1; gap:10px; }
  .item-row:last-child { border-bottom:none; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-size:16px; font-weight:700; color:#1a3a2a; }
  .item-qty { font-size:14px; color:#567; margin-top:2px; }
  .item-meta { font-size:11px; color:#9ab; margin-top:3px; }

  .status-btns { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
  .status-btn { padding:10px 14px; border-radius:12px; font-size:13px; font-weight:800; border:none; min-width:110px; text-align:center; }
  .status-btn.pending { background:#fff3d6; color:#a86a00; border:2px solid #ffdf9e; }
  .status-btn.done { background:#e3f7e9; color:#0a8d4b; border:2px solid #b6ecc9; }
  .status-btn.shortage-btn { background:#fdeaea; color:#c0392b; border:2px solid #f6c6c2; }
  .status-btn.shortage-done { background:#f6dede; color:#a13a2e; border:2px solid #ecbcb6; }

  /* ---- Sub tabs (active/closed) ---- */
  .subtabs { display:flex; gap:8px; padding:10px 12px 0; }
  .subtab-btn { flex:1; padding:10px; border-radius:12px 12px 0 0; border:none; font-size:14px; font-weight:800; background:#e3ede6; color:#5a7a68; }
  .subtab-btn.active { background:#fff; color:#0a5c33; }

  /* ---- Branch tabs ---- */
  .branch-tabs { display:flex; gap:8px; overflow-x:auto; padding:10px 12px; background:#fff; }
  .branch-tab { flex-shrink:0; padding:10px 16px; border-radius:20px; border:2px solid #e3ede6; background:#fafcfb; font-size:14px; font-weight:700; color:#1a3a2a; white-space:nowrap; }
  .branch-tab.active { background:#0a8d4b; border-color:#0a8d4b; color:#fff; }
  .branch-tab .badge { background:rgba(0,0,0,.15); border-radius:10px; padding:1px 7px; font-size:11px; margin-right:5px; }
  .branch-tab.active .badge { background:rgba(255,255,255,.3); }

  .shortage-note { font-size:11px; color:#c0392b; margin-top:3px; }

  /* ---- Manager shortages view ---- */
  .mgr-link { margin-top:18px; font-size:12px; color:#aab; text-align:center; text-decoration:underline; cursor:pointer; }
  .mgr-row { padding:12px 16px; border-bottom:1px solid #f0f5f1; }
  .mgr-row .mgr-top { display:flex; justify-content:space-between; font-size:13px; color:#789; }
  .mgr-row .mgr-name { font-size:15px; font-weight:700; color:#1a3a2a; margin-top:2px; }
  .mgr-row .mgr-note { font-size:12px; color:#c0392b; margin-top:2px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a3a2a; color:#fff; padding:12px 22px; border-radius:30px; font-size:14px; z-index:100; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>

<script>
const SB_URL = 'https://ojvbydnvywbsgyhqftap.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qdmJ5ZG52eXdic2d5aHFmdGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODQyMDcsImV4cCI6MjA5Njk2MDIwN30.3UyyKGcmehGVxadPotOgwYF6CmDbkdb8gw7BFxlYFcU';
const SB_HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

// ---- أقسام المرحلة الأولى: القسم -> {الاسم الظاهر، الباسورد} ----
// dept هنا لازم يطابق حرفياً قيمة "dept" في SKU_MAP فوق
const DEPTS = {
  'vip':                      { label: 'VIP',              password: '7001' },
  'مصنعات':                   { label: 'مصنعات',           password: '7002' },
  'مصنعات لحوم و موالح':      { label: 'مصنعات لحوم ودواجن', password: '7003' },
  'معمل':                     { label: 'معمل',             password: '7004' }
};

let currentDept = null;
let pollTimer = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function deptOfSku(sku) {
  const p = SKU_MAP[sku];
  if (p && p.dept) return p.dept;
  // بعض الأصناف الوهمية (تمن/ربع) مبنية على sku أساسي
  if (typeof VIRTUAL_SKU_MAP !== 'undefined' && VIRTUAL_SKU_MAP[sku]) {
    const base = SKU_MAP[VIRTUAL_SKU_MAP[sku].base];
    if (base) return base.dept;
  }
  return null;
}

/* ================= شاشة الدخول ================= */
const MGR_PASSWORD = '5099'; // باسورد لوحة النواقص لمدير التشغيل / مدير المصنع

let currentBranchTab = null;   // اسم الفرع النشط حاليًا
let currentSubTab = 'active';  // active | closed
let cachedGroups = {};         // آخر بيانات محملة (لإعادة الرسم بدون فتش)

/* ================= شاشة الدخول ================= */
function renderLogin(errMsg) {
  const app = document.getElementById('app');
  let selected = null;
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-title">🏭 تحضير القسم</div>
        <div class="login-sub">اختر قسمك وادخل الباسورد</div>
        <div id="deptButtons"></div>
        <input id="passInput" class="pass-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
        <button id="goBtn" class="login-go" disabled>دخول</button>
        <div id="loginErr" class="login-err">${errMsg || ''}</div>
        <div class="mgr-link" id="mgrLink">لوحة النواقص (لمديري التشغيل والمصنع)</div>
      </div>
    </div>`;
  const box = document.getElementById('deptButtons');
  Object.keys(DEPTS).forEach(key => {
    const btn = document.createElement('div');
    btn.className = 'dept-btn';
    btn.textContent = DEPTS[key].label;
    btn.onclick = () => {
      selected = key;
      [...box.children].forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('goBtn').disabled = false;
    };
    box.appendChild(btn);
  });
  document.getElementById('goBtn').onclick = () => {
    const pass = document.getElementById('passInput').value.trim();
    if (!selected) return;
    if (pass !== DEPTS[selected].password) {
      renderLogin('❌ الباسورد غير صحيح');
      return;
    }
    currentDept = selected;
    currentBranchTab = null;
    currentSubTab = 'active';
    sessionStorage.setItem('barq_dept', selected);
    renderMain();
  };
  document.getElementById('mgrLink').onclick = () => {
    const pass = prompt('باسورد لوحة النواقص:');
    if (pass === MGR_PASSWORD) {
      renderManagerView();
    } else if (pass !== null) {
      showToast('❌ باسورد غير صحيح');
    }
  };
}

/* ================= الشاشة الرئيسية (قسم) ================= */
function renderMain() {
  if (pollTimer) clearInterval(pollTimer);
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="dept-name">🏭 ${DEPTS[currentDept].label}</div>
      <button class="logout" id="logoutBtn">خروج</button>
    </div>
    <div class="status-line">
      <span id="lastUpdate">جاري التحميل...</span>
      <span id="pendingCount"></span>
    </div>
    <div class="subtabs">
      <button class="subtab-btn ${currentSubTab === 'active' ? 'active' : ''}" id="subActive">📋 الطلبيات النشطة</button>
      <button class="subtab-btn ${currentSubTab === 'closed' ? 'active' : ''}" id="subClosed">✅ طلبيات مغلقة</button>
    </div>
    <div class="branch-tabs" id="branchTabs"></div>
    <div id="list"></div>`;
  document.getElementById('logoutBtn').onclick = () => {
    sessionStorage.removeItem('barq_dept');
    currentDept = null;
    if (pollTimer) clearInterval(pollTimer);
    renderLogin();
  };
  document.getElementById('subActive').onclick = () => { currentSubTab = 'active'; renderMain(); };
  document.getElementById('subClosed').onclick = () => { currentSubTab = 'closed'; renderMain(); };
  loadAndRender();
  pollTimer = setInterval(loadAndRender, 8000);
}

async function loadAndRender() {
  try {
    const url = `${SB_URL}/rest/v1/branch_order_items?select=id,sku,product_name,quantity,unit,prep_status,prep_updated_by,prep_updated_at,shortage_note,order_id,branch_orders!inner(id,branch_name,created_at,status)&branch_orders.status=in.(pending,received)&order=order_id`;
    const res = await fetch(url, { headers: SB_HDR });
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();

    // فلترة على أصناف القسم الحالي فقط
    const myRows = rows.filter(r => deptOfSku(r.sku) === currentDept);

    // تجميع حسب الطلبية (الفرع)
    const groups = {};
    myRows.forEach(r => {
      const oid = r.order_id;
      if (!groups[oid]) {
        groups[oid] = {
          branch: r.branch_orders.branch_name,
          date: new Date(r.branch_orders.created_at),
          items: []
        };
      }
      groups[oid].items.push(r);
    });
    cachedGroups = groups;

    renderBranchTabsAndList();
    document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    const remaining = myRows.filter(r => r.prep_status === 'not_started').length;
    document.getElementById('pendingCount').textContent = remaining > 0 ? `متبقي ${remaining} صنف` : 'كل الأصناف اتحسمت ✅';
  } catch (e) {
    document.getElementById('lastUpdate').textContent = '⚠️ تعذر التحديث - هيحاول تاني';
  }
}

function isOrderClosed(g) {
  // الطلبية مغلقة لو كل الأصناف اتحسمت (تم أو نقص) أو لو تاريخها فات النهاردة
  const today = new Date(); today.setHours(0,0,0,0);
  const orderDay = new Date(g.date); orderDay.setHours(0,0,0,0);
  const allHandled = g.items.every(i => i.prep_status !== 'not_started');
  return allHandled || orderDay < today;
}

function renderBranchTabsAndList() {
  const groups = cachedGroups;
  // فلترة حسب التاب الفرعي (نشطة / مغلقة)
  const filteredIds = Object.keys(groups).filter(oid => {
    const closed = isOrderClosed(groups[oid]);
    return currentSubTab === 'closed' ? closed : !closed;
  });

  // أسماء الفروع المتاحة في هذا التاب
  const branchNames = [...new Set(filteredIds.map(oid => groups[oid].branch))];

  if (!currentBranchTab || !branchNames.includes(currentBranchTab)) {
    currentBranchTab = branchNames[0] || null;
  }

  const tabsBox = document.getElementById('branchTabs');
  if (branchNames.length === 0) {
    tabsBox.innerHTML = '';
    document.getElementById('list').innerHTML = `<div class="empty">${currentSubTab === 'closed' ? 'لا توجد طلبيات مغلقة بعد' : 'لا توجد طلبات نشطة لقسمك حالياً'}</div>`;
    return;
  }

  tabsBox.innerHTML = branchNames.map(bn => {
    const idsForBranch = filteredIds.filter(oid => groups[oid].branch === bn);
    const pendingCount = idsForBranch.reduce((sum, oid) => sum + groups[oid].items.filter(i => i.prep_status === 'not_started').length, 0);
    return `<button class="branch-tab ${bn === currentBranchTab ? 'active' : ''}" data-branch="${esc(bn)}">
      ${pendingCount > 0 ? `<span class="badge">${pendingCount}</span>` : ''}${esc(bn)}
    </button>`;
  }).join('');
  [...tabsBox.children].forEach(btn => {
    btn.onclick = () => { currentBranchTab = btn.getAttribute('data-branch'); renderBranchTabsAndList(); };
  });

  const idsThisBranch = filteredIds.filter(oid => groups[oid].branch === currentBranchTab);
  renderList(groups, idsThisBranch);
}

function renderList(groups, ids) {
  const list = document.getElementById('list');
  if (ids.length === 0) {
    list.innerHTML = `<div class="empty">لا توجد طلبات في هذا الفرع حاليًا</div>`;
    return;
  }
  ids.sort((a, b) => {
    const pa = groups[a].items.filter(i => i.prep_status === 'not_started').length;
    const pb = groups[b].items.filter(i => i.prep_status === 'not_started').length;
    return pb - pa;
  });

  list.innerHTML = ids.map(oid => {
    const g = groups[oid];
    const dateStr = g.date.toLocaleDateString('ar-EG', { day: '2-digit', month: '2-digit' });
    const doneCount = g.items.filter(i => i.prep_status !== 'not_started').length;
    const readOnly = currentSubTab === 'closed';
    const itemsHtml = g.items.map(item => {
      const isDone = item.prep_status === 'done';
      const isShortage = item.prep_status === 'shortage';
      let btns;
      if (readOnly) {
        btns = `<div class="status-btns"><span class="status-btn ${isDone ? 'done' : isShortage ? 'shortage-done' : 'pending'}">${isDone ? '✅ تم التجهيز' : isShortage ? '⚠️ نقص' : '⏳ لم يبدأ'}</span></div>`;
      } else if (isDone) {
        btns = `<div class="status-btns"><span class="status-btn done">✅ تم التجهيز</span></div>`;
      } else if (isShortage) {
        btns = `<div class="status-btns"><span class="status-btn shortage-done">⚠️ نقص مسجل</span></div>`;
      } else {
        btns = `<div class="status-btns">
          <button class="status-btn pending" onclick="markStatus('${item.id}','done')">✅ تم التجهيز</button>
          <button class="status-btn shortage-btn" onclick="markStatus('${item.id}','shortage')">⚠️ الكمية ناقصة</button>
        </div>`;
      }
      return `
        <div class="item-row">
          <div class="item-info">
            <div class="item-name">${esc(item.product_name)}</div>
            <div class="item-qty">${item.quantity} ${esc(item.unit || '')}</div>
            ${(isDone || isShortage) && item.prep_updated_at ? `<div class="item-meta">✔ ${new Date(item.prep_updated_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>` : ''}
            ${isShortage && item.shortage_note ? `<div class="shortage-note">📝 ${esc(item.shortage_note)}</div>` : ''}
          </div>
          ${btns}
        </div>`;
    }).join('');
    return `
      <div class="branch-block">
        <div class="branch-head">
          <span>🏬 ${esc(g.branch)} - ${dateStr}</span>
          <span class="cnt">${doneCount}/${g.items.length}</span>
        </div>
        ${itemsHtml}
      </div>`;
  }).join('');
}

async function markStatus(itemId, status) {
  if (status === 'shortage') {
    const note = prompt('ملاحظة عن النقص (اختياري):', '') || '';
    if (!confirm('تأكيد: الكمية دي فيها نقص؟')) return;
    await updateItem(itemId, 'shortage', note);
  } else {
    if (!confirm('تأكيد: تم تجهيز هذا الصنف بالكامل؟')) return;
    await updateItem(itemId, 'done', null);
  }
}

async function updateItem(itemId, status, note) {
  try {
    const body = {
      prep_status: status,
      prep_updated_by: DEPTS[currentDept].label,
      prep_updated_at: new Date().toISOString()
    };
    if (note !== null) body.shortage_note = note;
    const res = await fetch(`${SB_URL}/rest/v1/branch_order_items?id=eq.${itemId}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('update failed');
    showToast(status === 'done' ? '✅ تم تسجيل التجهيز' : '⚠️ تم تسجيل النقص');
    loadAndRender();
  } catch (e) {
    showToast('❌ حصل خطأ، حاول تاني');
  }
}

/* ================= لوحة النواقص (لمدير التشغيل / مدير المصنع) ================= */
async function renderManagerView() {
  if (pollTimer) clearInterval(pollTimer);
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="dept-name">⚠️ لوحة النواقص</div>
      <button class="logout" id="backBtn">رجوع</button>
    </div>
    <div class="status-line"><span id="mgrUpdate">جاري التحميل...</span><span></span></div>
    <div id="mgrList"></div>`;
  document.getElementById('backBtn').onclick = () => { renderLogin(); };
  await loadShortages();
  pollTimer = setInterval(loadShortages, 10000);
}

async function loadShortages() {
  try {
    const url = `${SB_URL}/rest/v1/branch_order_items?select=id,sku,product_name,quantity,unit,prep_status,prep_updated_by,prep_updated_at,shortage_note,order_id,branch_orders(branch_name,created_at)&prep_status=eq.shortage&order=prep_updated_at.desc`;
    const res = await fetch(url, { headers: SB_HDR });
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    const list = document.getElementById('mgrList');
    if (rows.length === 0) {
      list.innerHTML = `<div class="empty">لا توجد نواقص مسجلة حاليًا 🎉</div>`;
    } else {
      list.innerHTML = rows.map(r => `
        <div class="mgr-row">
          <div class="mgr-top">
            <span>${esc(r.branch_orders ? r.branch_orders.branch_name : '')}</span>
            <span>${r.prep_updated_at ? new Date(r.prep_updated_at).toLocaleString('ar-EG',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</span>
          </div>
          <div class="mgr-name">${esc(r.product_name)} — ${r.quantity} ${esc(r.unit || '')}</div>
          <div class="mgr-top"><span>القسم: ${esc(deptLabelOfSku(r.sku))}</span><span>بواسطة: ${esc(r.prep_updated_by || '')}</span></div>
          ${r.shortage_note ? `<div class="mgr-note">📝 ${esc(r.shortage_note)}</div>` : ''}
        </div>`).join('');
    }
    document.getElementById('mgrUpdate').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('mgrUpdate').textContent = '⚠️ تعذر التحديث';
  }
}

function deptLabelOfSku(sku) {
  const d = deptOfSku(sku);
  const found = Object.keys(DEPTS).find(k => k === d);
  return found ? DEPTS[found].label : (d || '-');
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ================= بدء التشغيل ================= */
(function init() {
  const saved = sessionStorage.getItem('barq_dept');
  if (saved && DEPTS[saved]) {
    currentDept = saved;
    renderMain();
  } else {
    renderLogin();
  }
})();
</script>
